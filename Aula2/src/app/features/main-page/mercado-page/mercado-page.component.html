<div class="title">
    Produtos de Mercado
</div>

<div class="mercadorias">
    <app-card-mercado *ngFor="let m of mercadorias; track: $index" [mercadoria]="m" (click)="changeModal(m.id)" ></app-card-mercado>
</div>
<app-modal-mercado *ngIf="isOpen" (Closed)="closed()" [mercadoriaModal]="mercadoria" ></app-modal-mercado>
