<div class="card">
    <img src="{{comida.img}}" alt="Not Found">
    <div class="title">
        {{ comida.name }}
    </div>
    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; ">
       <p>{{ comida.portion }}</p>
    
        <p>R${{ comida.price }}</p>
    </div>
    <p class="description">
        Descrição: {{ comida.description }}
    </p>
</div>
