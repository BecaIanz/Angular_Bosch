<div class="container">
    <div class="container-pixel">
        @for(i of pixels; track $index){
            <div (click)="onChangeColor(i)" [style.top]="`${i.y * 3}px`"[style.left]="`${i.x * 3}px`" [style.backgroundColor]="i.color" class="pixel"></div>
        }
        @if(isChange){
            <div class="modal" [style.top]="`${pixelChange.y * 3}px`"[style.left]="`${pixelChange.x * 3}px`" >
                <h2>Escolha a Cor</h2>
                <input type="color" (input)="color = $event.target.value"/>
                <button class="button" (click)="closeModal()">Confirmar</button>
            </div>
        }
    </div>
</div>
